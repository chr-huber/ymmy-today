<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Email confirmed — ymmy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tailwind.css?v=20260310">
  <script>if (localStorage.getItem('dark-mode') === 'true') document.documentElement.classList.add('dark');</script>
</head>
<body class="font-sans bg-paper dark:bg-stone-950 text-stone-800 dark:text-stone-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm text-center">
    <a href="/" class="text-2xl font-bold tracking-tight font-serif hover:text-finnish-700 transition-colors">ymmy</a>
    <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-2xl shadow-sm p-8 mt-8">
      {% if confirmed %}
      <div class="text-4xl mb-4">✅</div>
      <h1 class="text-xl font-bold font-serif mb-2">Email confirmed!</h1>
      <p class="text-sm text-stone-500 dark:text-stone-400 mb-6">You're all set. Sign in to start reading.</p>
      <a href="/login" class="block w-full bg-finnish-600 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-finnish-700 transition-colors">Sign in →</a>
      {% else %}
      <div class="text-4xl mb-4">❌</div>
      <h1 class="text-xl font-bold font-serif mb-2">Invalid or expired link</h1>
      <p class="text-sm text-stone-500 dark:text-stone-400 mb-6">This confirmation link is no longer valid.</p>
      <a href="/" class="block w-full bg-stone-100 dark:bg-stone-800 text-stone-700 dark:text-stone-300 rounded-lg py-2.5 text-sm font-medium hover:bg-stone-200 dark:hover:bg-stone-700 transition-colors">Go home</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
