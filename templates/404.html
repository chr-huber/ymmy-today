{% extends "base.html" %}

{% block title %}Page Not Found - ymmy{% endblock %}

{% block content %}
<div class="text-center py-16">
  <h1 class="font-serif text-4xl font-bold text-stone-900 dark:text-stone-50 mb-4">404</h1>
  <p class="text-xl text-stone-600 dark:text-stone-300 mb-2">Page Not Found</p>
  <p class="text-stone-500 dark:text-stone-400 mb-8">The page you're looking for doesn't exist.</p>
  
  <div class="flex justify-center gap-4">
    <a href="/" class="px-6 py-2 bg-amber-400 text-white rounded-lg hover:bg-amber-500 transition-colors font-medium">
      Return Home
    </a>
    <button onclick="history.back()" class="px-6 py-2 border border-stone-300 dark:border-stone-600 text-stone-600 dark:text-stone-300 rounded-lg hover:bg-stone-50 dark:hover:bg-stone-800 transition-colors font-medium">
      Go Back
    </button>
  </div>
</div>
{% endblock %}
