<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Sign in — ymmy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tailwind.css?v=20260310">
  <script>if (localStorage.getItem('dark-mode') === 'true') document.documentElement.classList.add('dark');</script>
</head>
<body class="font-sans bg-paper dark:bg-stone-950 text-stone-800 dark:text-stone-100 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="text-2xl font-bold tracking-tight font-serif hover:text-finnish-700 transition-colors">ymmy</a>
      <p class="text-sm text-stone-400 dark:text-stone-500 mt-1">Sign in to track your progress</p>
    </div>

    <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-2xl shadow-sm p-6">
      {% if error %}
      <div class="mb-4 px-3 py-2 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-700 dark:text-red-400">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
          <label for="username" class="block text-xs font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wide mb-1">Username</label>
          <input type="text" id="username" name="username" required autofocus
                 class="w-full border border-stone-200 dark:border-stone-700 rounded-lg px-3 py-2 text-sm bg-white dark:bg-stone-800 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-finnish-400 focus:border-transparent">
        </div>
        <div>
          <label for="password" class="block text-xs font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wide mb-1">Password</label>
          <input type="password" id="password" name="password" required
                 class="w-full border border-stone-200 dark:border-stone-700 rounded-lg px-3 py-2 text-sm bg-white dark:bg-stone-800 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-finnish-400 focus:border-transparent">
        </div>
        <button type="submit"
                class="w-full bg-finnish-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-finnish-700 transition-colors">
          Sign in
        </button>
        <div class="text-right">
          <a href="/forgot-password" class="text-xs text-stone-400 dark:text-stone-500 hover:text-stone-600 dark:hover:text-stone-300 transition-colors">Forgot password?</a>
        </div>
      </form>
    </div>

    <p class="text-center mt-4 text-xs text-stone-400 dark:text-stone-500">
      No account? <a href="/register" class="hover:text-stone-600 dark:hover:text-stone-300 transition-colors">Create one →</a>
    </p>
    <p class="text-center mt-2 text-xs text-stone-400 dark:text-stone-500">
      <a href="/" class="hover:text-stone-600 dark:hover:text-stone-300 transition-colors">Continue without signing in →</a>
    </p>
  </div>

</body>
</html>
