<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark" />
  <title>Reset password — ymmy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/tailwind.css?v=20260310">
  <script>if (localStorage.getItem('dark-mode') === 'true') document.documentElement.classList.add('dark');</script>
</head>
<body class="font-sans bg-paper dark:bg-stone-950 text-stone-800 dark:text-stone-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <a href="/" class="text-2xl font-bold tracking-tight font-serif hover:text-finnish-700 transition-colors">ymmy</a>
      <p class="text-sm text-stone-400 dark:text-stone-500 mt-1">Choose a new password</p>
    </div>
    <div class="bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-700 rounded-2xl shadow-sm p-6">
      {% if invalid %}
      <div class="text-center py-4">
        <div class="text-3xl mb-3">❌</div>
        <p class="text-sm text-stone-600 dark:text-stone-300">This reset link is invalid or has expired.</p>
        <a href="/forgot-password" class="block mt-4 text-sm text-finnish-600 dark:text-finnish-400 hover:text-finnish-700 transition-colors">Request a new link →</a>
      </div>
      {% elif success %}
      <div class="text-center py-4">
        <div class="text-3xl mb-3">✅</div>
        <p class="text-sm text-stone-600 dark:text-stone-300">Password updated. You can now sign in.</p>
        <a href="/login" class="block mt-4 w-full bg-finnish-600 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-finnish-700 transition-colors text-center">Sign in →</a>
      </div>
      {% else %}
      {% if error %}
      <div class="mb-4 px-3 py-2 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg text-sm text-red-700 dark:text-red-400">{{ error }}</div>
      {% endif %}
      <form method="post" action="/reset-password/{{ token }}" class="space-y-4">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div>
          <label for="password" class="block text-xs font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wide mb-1">New password</label>
          <input type="password" id="password" name="password" required minlength="8" autofocus
                 class="w-full border border-stone-200 dark:border-stone-700 rounded-lg px-3 py-2 text-sm bg-white dark:bg-stone-800 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-finnish-400 focus:border-transparent">
        </div>
        <div>
          <label for="password_confirm" class="block text-xs font-semibold text-stone-400 dark:text-stone-500 uppercase tracking-wide mb-1">Confirm password</label>
          <input type="password" id="password_confirm" name="password_confirm" required minlength="8"
                 class="w-full border border-stone-200 dark:border-stone-700 rounded-lg px-3 py-2 text-sm bg-white dark:bg-stone-800 dark:text-stone-100 focus:outline-none focus:ring-2 focus:ring-finnish-400 focus:border-transparent">
        </div>
        <button type="submit" class="w-full bg-finnish-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-finnish-700 transition-colors">
          Update password
        </button>
      </form>
      {% endif %}
    </div>
  </div>
</body>
</html>
